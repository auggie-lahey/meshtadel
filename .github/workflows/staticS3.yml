name: staticS3Deploy

on:
  push:
    branches: ["master", "dev", "deployBug"]
  schedule:
    - cron: "0 0 * * 1,3,6"

  workflow_dispatch:
    inputs:
      env:
        required: true
        default: "dev"
        description: "The environment to deploy to"
        type: choice
        options:
          - prod
          - dev

permissions:
  id-token: write # Required for OIDC authentication
  contents: read # Required to checkout your repository code

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and export Next.js application
        run: |
          pnpm run build
          node scripts/post-build.js
          ls -lah out/

        env:
          NEXT_SHARP_REQUIRE_CDN: 1

      - name: Deploy to Nostr/Blossom
        #uses: sandwichfarm/nsite-action@v0.2.2
        uses: auggie-lahey/nsite-action@0.0.0
        continue-on-error: false
        with:
          nbunksec: ${{ secrets.NBUNKSEC }}
          directory: "./out"
          relays: |
            wss://relay.nsite.lol
            wss://relay.damus.io
          servers: |
            https://cdn.hzrd149.com
            https://cdn.sovbit.host
          concurrency: 4
          fallback: /index.html
          publish_relay_list: true
          publish_server_list: true
          publish_profile: true
          verbose: false
          purge: true
          # force: true

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - name: Deploy to S3 and invalidate CloudFront
        run: |
          ls -lah
          ls -lah out
          if [[ "${{ inputs.env }}" == "prod" ]]; then
            bucket=kcbitcoiners.com/
            domain=kcbitcoiners.com
          else
            bucket=dev.kcbitcoiners.com/
            domain=dev.kcbitcoiners.com
          fi
          # Look up CloudFront distribution ID by domain alias
          did=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Aliases.Items[?contains(@,'${domain}')]].Id" \
            --output text)
          if [[ -z "$did" ]]; then
            echo "ERROR: No CloudFront distribution found for ${domain}"
            exit 1
          fi
          echo "CloudFront distribution: ${did}"
          aws s3 sync out/ s3://${bucket} --delete
          aws cloudfront create-invalidation --distribution-id $did --paths "/*"
